name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:          # reusable: release.yml calls this as its CI gate

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          set -e
          # The cyrius.cyml [package].cyrius pin is the single source of truth
          # (CLAUDE.md § CI/Release) — no version hardcoded here. The upstream
          # installer lays out $HOME/.cyrius/{bin,lib,versions/<v>}; the
          # versions/<v> directory is what `cyrius deps` pin-check requires (a
          # hand-rolled curl+cp does NOT create it and fails the check).
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Resolve dependencies
        run: cyrius deps

      - name: Lint (hard gate — any warning fails)
        run: |
          fail=0
          for f in src/*.cyr; do
            out=$(cyrius lint "$f" 2>&1 || true)
            echo "$out"
            if echo "$out" | grep -qE '^[[:space:]]*warn '; then
              echo "lint: warnings in $f"; fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present"; exit 1; }

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/${{ github.event.repository.name }}
          echo "puka: $(wc -c < build/${{ github.event.repository.name }}) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/${{ github.event.repository.name }} | grep -q "7f45 4c46"

      - name: Test
        # bare `cyrius test` runs [build].test AND auto-discovers tests/*.tcyr.
        run: cyrius test
